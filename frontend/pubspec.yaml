name: ai_bos
description: AI BOS - One AI. Every Workspace.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_riverpod: ^2.3.6
  go_router: ^10.0.0
  flutter_dotenv: ^5.1.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/animations/
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/logos/
    - assets/lottie/

