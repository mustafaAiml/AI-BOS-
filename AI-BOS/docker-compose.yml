version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: aibos-db
    restart: always
    environment:
      POSTGRES_USER: aibos_user
      POSTGRES_PASSWORD: aibos_password
      POSTGRES_DB: aibos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: aibos-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://aibos_user:aibos_password@db:5432/aibos_db
    depends_on:
      - db

volumes:
  postgres_data:
